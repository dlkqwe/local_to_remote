<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .game-container {
            text-align: center;
        }
        .game-title {
            color: #e94560;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 18px;
            margin-bottom: 10px;
            padding: 0 10px;
        }
        .game-info span {
            color: #0f0;
            font-weight: bold;
        }
        #gameCanvas {
            border: 3px solid #e94560;
            background: #000;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }
        .controls {
            color: #aaa;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.8;
        }
        .controls kbd {
            background: #333;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid #555;
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #e94560;
            text-align: center;
            z-index: 10;
        }
        #gameOverScreen h2 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 20px;
        }
        #gameOverScreen p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        #restartBtn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #restartBtn:hover {
            background: #ff6b6b;
        }
        .lives-display {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .life-icon {
            width: 20px;
            height: 20px;
            background: #0f0;
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">🎮 坦克大战</h1>
        <div class="game-info">
            <div>得分: <span id="score">0</span></div>
            <div>关卡: <span id="level">1</span></div>
            <div>生命: <span id="lives">❤️❤️❤️</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> 移动 &nbsp;&nbsp;
            <kbd>空格</kbd> / <kbd>J</kbd> 射击 &nbsp;&nbsp;
            <kbd>P</kbd> 暂停
        </div>
    </div>

    <div id="gameOverScreen">
        <h2 id="gameOverTitle">游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p id="gameOverReason">你的坦克被摧毁了！</p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverTitle = document.getElementById('gameOverTitle');
        const gameOverReason = document.getElementById('gameOverReason');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏配置
        const TILE_SIZE = 40;
        const MAP_WIDTH = 20;  // 800 / 40
        const MAP_HEIGHT = 15; // 600 / 40
        const TANK_SIZE = 36;
        const BULLET_SIZE = 6;
        const PLAYER_SPEED = 3;
        const ENEMY_SPEED = 1.5;
        const BULLET_SPEED = 8;

        // 地图元素类型
        const EMPTY = 0;
        const WALL = 1;      // 砖墙（可破坏）
        const STEEL = 2;     // 钢墙（不可破坏）
        const BASE = 3;      // 基地

        // 方向
        const UP = 0, RIGHT = 1, DOWN = 2, LEFT = 3;

        // 游戏状态
        let gameRunning = true;
        let gamePaused = false;
        let score = 0;
        let level = 1;
        let playerLives = 3;
        let playerInvincible = false;
        let invincibleTimer = 0;

        // 地图数据
        let map = [];

        // 玩家坦克
        let player = {
            x: 0, y: 0,
            dir: UP,
            moving: false,
            cooldown: 0,
            color: '#0f0'
        };

        // 敌人坦克数组
        let enemies = [];

        // 子弹数组
        let bullets = [];

        // 爆炸效果数组
        let explosions = [];

        // 粒子效果数组
        let particles = [];

        // 键盘状态
        const keys = {};

        // 生成地图
        function generateMap() {
            map = [];
            for (let y = 0; y < MAP_HEIGHT; y++) {
                map[y] = [];
                for (let x = 0; x < MAP_WIDTH; x++) {
                    // 边界
                    if (x === 0 || x === MAP_WIDTH - 1 || y === 0 || y === MAP_HEIGHT - 1) {
                        map[y][x] = STEEL;
                    }
                    // 基地位置
                    else if (x >= 9 && x <= 10 && y >= 13 && y <= 14) {
                        if (x === 9 && y === 13) map[y][x] = EMPTY;
                        else if (x === 10 && y === 13) map[y][x] = EMPTY;
                        else if (x >= 9 && x <= 10 && y === 14) map[y][x] = BASE;
                        else map[y][x] = EMPTY;
                    }
                    // 玩家出生区域
                    else if (x >= 8 && x <= 11 && y >= 12 && y <= 14) {
                        map[y][x] = EMPTY;
                    }
                    // 随机生成墙壁
                    else if (Math.random() < 0.15) {
                        map[y][x] = WALL;
                    }
                    else if (Math.random() < 0.03) {
                        map[y][x] = STEEL;
                    }
                    else {
                        map[y][x] = EMPTY;
                    }
                }
            }

            // 确保基地周围有一些保护
            map[13][8] = WALL;
            map[13][11] = WALL;
            map[12][8] = WALL;
            map[12][9] = WALL;
            map[12][10] = WALL;
            map[12][11] = WALL;
        }

        // 初始化玩家
        function initPlayer() {
            player.x = 9 * TILE_SIZE + (TILE_SIZE - TANK_SIZE) / 2;
            player.y = 13 * TILE_SIZE + (TILE_SIZE - TANK_SIZE) / 2;
            player.dir = UP;
            player.cooldown = 0;
            playerInvincible = true;
            invincibleTimer = 180; // 3秒无敌
        }

        // 生成敌人
        function spawnEnemy() {
            const spawnPoints = [
                { x: 1 * TILE_SIZE, y: 1 * TILE_SIZE },
                { x: 18 * TILE_SIZE, y: 1 * TILE_SIZE },
                { x: 9 * TILE_SIZE, y: 1 * TILE_SIZE }
            ];
            const spawn = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];

            enemies.push({
                x: spawn.x + (TILE_SIZE - TANK_SIZE) / 2,
                y: spawn.y + (TILE_SIZE - TANK_SIZE) / 2,
                dir: DOWN,
                moving: true,
                cooldown: Math.random() * 60,
                changeDirTimer: Math.random() * 60 + 30,
                color: '#f00',
                type: Math.random() < 0.3 ? 'fast' : 'normal'
            });
        }

        // 创建子弹
        function createBullet(tank, isPlayer) {
            const offset = (TANK_SIZE - BULLET_SIZE) / 2;
            let bx = tank.x + offset;
            let by = tank.y + offset;
            let bdx = 0, bdy = 0;

            switch (tank.dir) {
                case UP: by -= BULLET_SIZE; bdy = -BULLET_SPEED; break;
                case DOWN: by += TANK_SIZE; bdy = BULLET_SPEED; break;
                case LEFT: bx -= BULLET_SIZE; bdx = -BULLET_SPEED; break;
                case RIGHT: bx += TANK_SIZE; bdx = BULLET_SPEED; break;
            }

            bullets.push({
                x: bx, y: by,
                dx: bdx, dy: bdy,
                isPlayer: isPlayer,
                owner: isPlayer ? 'player' : tank
            });
        }

        // 创建爆炸效果
        function createExplosion(x, y, size) {
            explosions.push({ x, y, size, timer: 30 });
            // 添加粒子
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x + size / 2,
                    y: y + size / 2,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    life: 30 + Math.random() * 20,
                    color: `hsl(${30 + Math.random() * 30}, 100%, ${50 + Math.random() * 30}%)`,
                    size: 3 + Math.random() * 5
                });
            }
        }

        // 检测碰撞
        function checkCollision(x, y, size) {
            const left = Math.floor(x / TILE_SIZE);
            const right = Math.floor((x + size - 1) / TILE_SIZE);
            const top = Math.floor(y / TILE_SIZE);
            const bottom = Math.floor((y + size - 1) / TILE_SIZE);

            for (let ty = top; ty <= bottom; ty++) {
                for (let tx = left; tx <= right; tx++) {
                    if (ty < 0 || ty >= MAP_HEIGHT || tx < 0 || tx >= MAP_WIDTH) return true;
                    if (map[ty][tx] === WALL || map[ty][tx] === STEEL) return true;
                }
            }
            return false;
        }

        // 坦克间碰撞
        function checkTankCollision(tank1, tank2, size) {
            return tank1.x < tank2.x + size &&
                   tank1.x + size > tank2.x &&
                   tank1.y < tank2.y + size &&
                   tank1.y + size > tank2.y;
        }

        // 移动坦克
        function moveTank(tank, speed, isPlayer) {
            let nx = tank.x;
            let ny = tank.y;

            switch (tank.dir) {
                case UP: ny -= speed; break;
                case DOWN: ny += speed; break;
                case LEFT: nx -= speed; break;
                case RIGHT: nx += speed; break;
            }

            // 边界检查
            if (nx < 0 || nx > canvas.width - TANK_SIZE ||
                ny < 0 || ny > canvas.height - TANK_SIZE) {
                return false;
            }

            // 地图碰撞检查
            if (checkCollision(nx, ny, TANK_SIZE)) {
                return false;
            }

            // 坦克间碰撞
            if (isPlayer) {
                for (let enemy of enemies) {
                    if (checkTankCollision({x: nx, y: ny}, enemy, TANK_SIZE)) {
                        return false;
                    }
                }
            } else {
                if (checkTankCollision({x: nx, y: ny}, player, TANK_SIZE)) {
                    return false;
                }
                for (let other of enemies) {
                    if (other !== tank && checkTankCollision({x: nx, y: ny}, other, TANK_SIZE)) {
                        return false;
                    }
                }
            }

            tank.x = nx;
            tank.y = ny;
            return true;
        }

        // 更新子弹
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.dx;
                b.y += b.dy;

                // 边界检查
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                // 地图碰撞
                const tx = Math.floor((b.x + BULLET_SIZE / 2) / TILE_SIZE);
                const ty = Math.floor((b.y + BULLET_SIZE / 2) / TILE_SIZE);

                if (ty >= 0 && ty < MAP_HEIGHT && tx >= 0 && tx < MAP_WIDTH) {
                    if (map[ty][tx] === WALL) {
                        map[ty][tx] = EMPTY;
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE);
                        bullets.splice(i, 1);
                        continue;
                    } else if (map[ty][tx] === STEEL) {
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE / 2);
                        bullets.splice(i, 1);
                        continue;
                    } else if (map[ty][tx] === BASE) {
                        map[ty][tx] = EMPTY;
                        createExplosion(tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE);
                        bullets.splice(i, 1);
                        gameOver('基地被摧毁了！');
                        return;
                    }
                }

                // 玩家子弹击中敌人
                if (b.isPlayer) {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if (b.x < e.x + TANK_SIZE && b.x + BULLET_SIZE > e.x &&
                            b.y < e.y + TANK_SIZE && b.y + BULLET_SIZE > e.y) {
                            createExplosion(e.x, e.y, TANK_SIZE);
                            enemies.splice(j, 1);
                            bullets.splice(i, 1);
                            score += 100;
                            updateUI();
                            break;
                        }
                    }
                }
                // 敌人子弹击中玩家
                else {
                    if (!playerInvincible &&
                        b.x < player.x + TANK_SIZE && b.x + BULLET_SIZE > player.x &&
                        b.y < player.y + TANK_SIZE && b.y + BULLET_SIZE > player.y) {
                        createExplosion(player.x, player.y, TANK_SIZE);
                        bullets.splice(i, 1);
                        playerHit();
                    }
                }
            }
        }

        // 玩家被击中
        function playerHit() {
            playerLives--;
            updateUI();
            if (playerLives <= 0) {
                gameOver('你的坦克被摧毁了！');
            } else {
                initPlayer();
            }
        }

        // 更新敌人AI
        function updateEnemies() {
            // 根据关卡确定最大敌人数量
            const maxEnemies = 3 + Math.floor(level / 2);
            const targetEnemies = Math.min(maxEnemies, 4 + level);

            if (enemies.length < targetEnemies && Math.random() < 0.01) {
                spawnEnemy();
            }

            for (let enemy of enemies) {
                enemy.changeDirTimer--;
                enemy.cooldown--;

                // 随机改变方向
                if (enemy.changeDirTimer <= 0 || !moveTank(enemy, enemy.type === 'fast' ? ENEMY_SPEED * 1.5 : ENEMY_SPEED, false)) {
                    enemy.dir = Math.floor(Math.random() * 4);
                    enemy.changeDirTimer = Math.random() * 60 + 30;
                }

                // 随机射击
                if (enemy.cooldown <= 0 && Math.random() < 0.03) {
                    createBullet(enemy, false);
                    enemy.cooldown = 60 + Math.random() * 60;
                }
            }
        }

        // 更新爆炸效果
        function updateExplosions() {
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].timer--;
                if (explosions[i].timer <= 0) {
                    explosions.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.dx;
                p.y += p.dy;
                p.dx *= 0.95;
                p.dy *= 0.95;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 更新玩家
        function updatePlayer() {
            if (player.cooldown > 0) player.cooldown--;
            if (invincibleTimer > 0) {
                invincibleTimer--;
                if (invincibleTimer <= 0) playerInvincible = false;
            }

            if (!gameRunning || gamePaused) return;

            let moving = false;
            let newDir = player.dir;

            if (keys['KeyW'] || keys['ArrowUp']) { newDir = UP; moving = true; }
            else if (keys['KeyS'] || keys['ArrowDown']) { newDir = DOWN; moving = true; }
            else if (keys['KeyA'] || keys['ArrowLeft']) { newDir = LEFT; moving = true; }
            else if (keys['KeyD'] || keys['ArrowRight']) { newDir = RIGHT; moving = true; }

            if (moving) {
                player.dir = newDir;
                moveTank(player, PLAYER_SPEED, true);
            }

            // 射击
            if ((keys['Space'] || keys['KeyJ']) && player.cooldown <= 0) {
                createBullet(player, true);
                player.cooldown = 20;
            }
        }

        // 绘制地图
        function drawMap() {
            for (let y = 0; y < MAP_HEIGHT; y++) {
                for (let x = 0; x < MAP_WIDTH; x++) {
                    const px = x * TILE_SIZE;
                    const py = y * TILE_SIZE;

                    switch (map[y][x]) {
                        case WALL:
                            // 砖墙
                            ctx.fillStyle = '#8B4513';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#A0522D';
                            ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            ctx.strokeStyle = '#654321';
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(px + TILE_SIZE / 2, py);
                            ctx.lineTo(px + TILE_SIZE / 2, py + TILE_SIZE);
                            ctx.moveTo(px, py + TILE_SIZE / 2);
                            ctx.lineTo(px + TILE_SIZE, py + TILE_SIZE / 2);
                            ctx.stroke();
                            break;
                        case STEEL:
                            // 钢墙
                            ctx.fillStyle = '#708090';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#9090A0';
                            ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            ctx.strokeStyle = '#506070';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(px + 4, py + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                            break;
                        case BASE:
                            // 基地
                            ctx.fillStyle = '#FFD700';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#FFA500';
                            ctx.fillRect(px + 5, py + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                            ctx.fillStyle = '#FF8C00';
                            ctx.beginPath();
                            ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, 8, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        default:
                            // 地面
                            ctx.fillStyle = ((x + y) % 2 === 0) ? '#0a0a0a' : '#0d0d0d';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // 绘制坦克
        function drawTank(tank, isPlayer) {
            const x = tank.x;
            const y = tank.y;
            const size = TANK_SIZE;
            const half = size / 2;

            ctx.save();
            ctx.translate(x + half, y + half);
            ctx.rotate(tank.dir * Math.PI / 2);
            ctx.translate(-half, -half);

            // 坦克主体
            ctx.fillStyle = isPlayer ? '#4CAF50' : (tank.type === 'fast' ? '#FF6B6B' : '#E94560');
            ctx.fillRect(4, 4, size - 8, size - 8);

            // 履带
            ctx.fillStyle = isPlayer ? '#2E7D32' : '#C0392B';
            ctx.fillRect(0, 2, 6, size - 4);
            ctx.fillRect(size - 6, 2, 6, size - 4);

            // 炮塔
            ctx.fillStyle = isPlayer ? '#66BB6A' : '#FF8A80';
            ctx.fillRect(half - 8, half - 8, 16, 16);

            // 炮管
            ctx.fillStyle = isPlayer ? '#81C784' : '#FFAB91';
            ctx.fillRect(half - 3, 2, 6, half - 8);

            // 无敌闪烁效果
            if (isPlayer && playerInvincible && Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2;
                ctx.strokeRect(2, 2, size - 4, size - 4);
            }

            ctx.restore();
        }

        // 绘制子弹
        function drawBullets() {
            for (let b of bullets) {
                ctx.fillStyle = b.isPlayer ? '#FFEB3B' : '#FF5722';
                ctx.shadowColor = b.isPlayer ? '#FFEB3B' : '#FF5722';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(b.x + BULLET_SIZE / 2, b.y + BULLET_SIZE / 2, BULLET_SIZE / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 绘制爆炸效果
        function drawExplosions() {
            for (let e of explosions) {
                const progress = 1 - e.timer / 30;
                const radius = e.size / 2 + progress * e.size;
                const alpha = 1 - progress;

                ctx.fillStyle = `rgba(255, ${Math.floor(200 * (1 - progress))}, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(e.x + e.size / 2, e.y + e.size / 2, radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = `rgba(255, 255, 200, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(e.x + e.size / 2, e.y + e.size / 2, radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 绘制粒子
        function drawParticles() {
            for (let p of particles) {
                const alpha = p.life / 50;
                ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('hsl', 'hsla');
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life / 50), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 更新UI
        function updateUI() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            let hearts = '';
            for (let i = 0; i < playerLives; i++) hearts += '❤️';
            livesEl.textContent = hearts || '💀';
        }

        // 游戏结束
        function gameOver(reason) {
            gameRunning = false;
            gameOverTitle.textContent = score > 0 ? '游戏结束' : '游戏结束';
            gameOverReason.textContent = reason;
            finalScoreEl.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // 重新开始
        function restart() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            level = 1;
            playerLives = 3;
            playerInvincible = false;
            invincibleTimer = 0;
            bullets = [];
            enemies = [];
            explosions = [];
            particles = [];
            gameOverScreen.style.display = 'none';
            generateMap();
            initPlayer();
            updateUI();
        }

        // 主循环
        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameRunning && !gamePaused) {
                updatePlayer();
                updateEnemies();
                updateBullets();
                updateExplosions();

                // 关卡进度
                if (enemies.length === 0 && score > 0 && score % 500 === 0) {
                    level++;
                    updateUI();
                }
            }

            // 绘制
            drawMap();
            drawTank(player, true);
            for (let enemy of enemies) {
                drawTank(enemy, false);
            }
            drawBullets();
            drawExplosions();
            drawParticles();

            // 暂停提示
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText('游戏暂停', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Microsoft YaHei';
                ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 50);
            }

            requestAnimationFrame(gameLoop);
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'KeyP') {
                if (gameRunning) {
                    gamePaused = !gamePaused;
                }
            }

            // 防止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 重新开始按钮
        restartBtn.addEventListener('click', restart);

        // 初始化游戏
        generateMap();
        initPlayer();
        updateUI();

        // 初始生成几个敌人
        for (let i = 0; i < 3; i++) {
            spawnEnemy();
        }

        // 启动游戏
        gameLoop();
    </script>
</body>
</html>
